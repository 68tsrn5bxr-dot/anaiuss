<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pressel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    height: 100dvh;
    overflow: hidden;
    color: #fff;
}

/* FUNDO */
.hero {
    width: 100%;
    height: 100dvh;
    background: url('file:///C:/Users/bonec/Downloads/86D288EA-EDCA-4D3A-94B1-BE6CB2017AF8.jpeg') center/cover no-repeat;
    position: relative;
}

/* DEGRADÊ */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.2) 20%,
        rgba(0,0,0,0.7) 70%,
        #000 100%
    );
}

/* TEXTO (MAIS PRA CIMA E SEGURO NO IPHONE) */
.top-content {
    position: absolute;
    top: calc(8% + env(safe-area-inset-top));
    width: 100%;
    text-align: center;
    z-index: 2;
    padding: 0 20px;
}

h1 {
    font-size: 30px;
    font-weight: 600;
}

.username {
    opacity: 0.7;
    margin-bottom: 8px;
}

.text {
    font-size: 15px;
    font-weight: 300;
    opacity: 0.9;
}

/* IMAGEM CENTRAL PERFEITA */
.card {
    position: absolute;
    top: 52%;
    left: 50%;
    transform: translate(-50%, -50%);
    
    width: 88%;
    max-width: 340px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 15px 40px rgba(0,0,0,0.85);
    z-index: 2;
}

.card img {
    width: 100%;
    display: block;
}

/* BOTÃO SOBRE A IMAGEM */
.btn {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    
    background: linear-gradient(45deg, #ff0057, #ff7a00);
    padding: 15px;
    border-radius: 40px;
    text-decoration: none;
    color: #fff;
    font-weight: 600;
    font-size: 15px;
    text-align: center;

    width: 88%;
    box-shadow: 0 0 20px rgba(255,0,80,0.6);
    transition: 0.3s;
}

.btn:hover {
    transform: translateX(-50%) scale(1.05);
}

/* RESPONSIVO */
@media(max-width: 600px){
    h1 {
        font-size: 26px;
    }

    .text {
        font-size: 14px;
    }
}
</style>
</head>

<body>

<div class="hero">
    <div class="overlay"></div>

    <!-- TEXTO -->
    <div class="top-content">
        <h1>Ana Iuss</h1>
        <div class="username">@ana_iuss</div>
        <div class="text">
            Aqui é onde você vai me conhecer
        </div>
    </div>

    <!-- IMAGEM + BOTÃO -->
    <div class="card">
        <img src="file:///C:/Users/bonec/Downloads/raba12+1.jpg">
        <a href="#" id="linkBtn" class="btn">VER AGORA 🔥</a>
    </div>

</div>

<script>
// 🔥 SEU LINK
const link = "https://phantoms.group/l/anaiuss?shk=4jyd2agr";

document.getElementById("linkBtn").addEventListener("click", function(){
    window.location.href = link;
});

// AUTO REDIRECT (5s)
setTimeout(() => {
    window.location.href = link;
}, 5000);
</script>

</body>
</html>
